spring.application.name=hospital-appointment-system

# Server port
server.port=${PORT:8080}

# Database connection — uses env vars in production, falls back to local defaults
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/hospital_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:root}

# Hibernate and JPA properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# JWT
hospital.app.jwtSecret=${JWT_SECRET:======================HospitalAppSecretKey======================}
hospital.app.jwtExpirationMs=${JWT_EXPIRATION:86400000}
